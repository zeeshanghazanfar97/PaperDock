version: "3.9"

services:
  paperdock:
    build: .
    container_name: paperdock
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PROXY_API_URL: ${PROXY_API_URL:-http://10.1.1.190:8000}
      DATA_DIR: ${DATA_DIR:-/data}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_AUTHORIZATION_URL: ${OIDC_AUTHORIZATION_URL:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_TOKEN_URL: ${OIDC_TOKEN_URL:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_END_SESSION_URL: ${OIDC_END_SESSION_URL:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-paperdock_session}
      AUTH_TRANSACTION_COOKIE_NAME: ${AUTH_TRANSACTION_COOKIE_NAME:-paperdock_oidc_tx}
      OIDC_SESSION_TTL_SECONDS: ${OIDC_SESSION_TTL_SECONDS:-28800}
      OIDC_TRANSACTION_TTL_SECONDS: ${OIDC_TRANSACTION_TTL_SECONDS:-600}
      OIDC_CLOCK_SKEW_SECONDS: ${OIDC_CLOCK_SKEW_SECONDS:-60}
    volumes:
      - ./data:/data
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperdock.rule=Host(`paperdock.zeeit.dev`)"
      - "traefik.http.routers.paperdock.entrypoints=websecure"
      - "traefik.http.routers.paperdock.tls.certresolver=cloudflare"
      - "traefik.http.services.paperdock.loadbalancer.server.port=3000"

networks:
  traefik-public:
    external: true
